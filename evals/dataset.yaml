# Golden dataset for offline RAG evals.
#
# 15 entries — one per production action button in config.py:90 — spanning
# lookup / listing / analytics / reference intents.
#
# `ground_truth` strings are hand-authored from inspection of the seeded
# rows in evals/fixtures/eval_db_seed.jsonl — NOT from running the current
# agent (that would lock in current behavior as the baseline).
#
# Schema:
#   id                — stable identifier (also used as pytest test id)
#   query             — exact user-facing query string
#   intent            — lookup | listing | analytics | reference
#   expected_tool     — query | retrieve | either (advisory; not asserted)
#   ground_truth      — author-written ideal answer; consumed by Ragas as
#                       `reference` for both context_recall and
#                       answer_correctness
#   expected_cve_ids  — optional human-maintained recall hint; NOT what
#                       Ragas's context_recall actually consumes (it reads
#                       `reference`). Populate where natural.
#   notes             — optional human commentary

- id: cve_lookup_2026_25253
  query: "CVE-2026-25253"
  intent: lookup
  expected_tool: query
  ground_truth: |
    CVE-2026-25253 is an OpenClaw (aka clawdbot or Moltbot) vulnerability
    affecting versions before 2026.1.29. The product obtains a gatewayUrl
    value from a query string and automatically opens a WebSocket
    connection without prompting the user, sending a token value in the
    process. NVD rates it CVSS 3.1 = 8.8 (HIGH). It is in the NVD dataset
    (published 2026-02-01) but is not listed in CISA KEV.
  expected_cve_ids:
    - CVE-2026-25253
  notes: |
    Tests the agent's ability to acknowledge an NVD-only CVE rather than
    incorrectly reporting "not found" when it isn't in KEV.

- id: latest_kev_additions
  query: "Latest KEV additions"
  intent: listing
  expected_tool: query
  ground_truth: |
    The most recent KEV additions (date_added 2026-04-20 through
    2026-04-24) include: SimpleHelp Missing Authorization
    (CVE-2024-57726), Samsung MagicINFO 9 Server Path Traversal
    (CVE-2024-7399), D-Link DIR-823X Command Injection (CVE-2025-29635),
    SimpleHelp Path Traversal (CVE-2024-57728), Marimo Remote Code
    Execution (CVE-2026-39987), Microsoft Defender Insufficient
    Granularity of Access Control (CVE-2026-33825), JetBrains TeamCity
    Relative Path Traversal (CVE-2024-27199), Quest KACE SMA Improper
    Authentication (CVE-2025-32975), PaperCut NG/MF Improper
    Authentication (CVE-2023-27351), and Kentico Xperience Path Traversal
    (CVE-2025-2749). The list should be ordered by date_added DESC.
  notes: |
    The seed includes the latest 50 KEV rows; ground truth covers the
    top 10 by date.

- id: top_vendors_kev
  query: "Top vendors in KEV"
  intent: analytics
  expected_tool: query
  ground_truth: |
    Top vendors in the KEV dataset by row count are: Microsoft (9),
    Apple (4), Cisco (4), Apache (3), Fortinet (3), Google (3), and
    Ivanti (3), with several vendors tied at 2 entries (Adobe,
    SimpleHelp, Synacor). The agent's SQL should GROUP BY vendor_project
    ORDER BY count DESC.
  notes: |
    Analytics question — agent should hit the `query` tool, not
    `retrieve`. Tool selection here is one of the harness's signals.

- id: cwe_78
  query: "CWE-78"
  intent: reference
  expected_tool: query
  ground_truth: |
    CWE-78 is "Improper Neutralization of Special Elements used in an
    OS Command ('OS Command Injection')" — a Base-abstraction weakness.
    It describes a class of bugs where a product constructs an OS
    command using externally-influenced input from an upstream component
    but fails to (or incorrectly) neutralize special elements that could
    modify the intended OS command when it is sent to a downstream
    component.

- id: log4j
  query: "Log4j"
  intent: lookup
  expected_tool: either
  ground_truth: |
    The seed contains four Apache Log4j vulnerabilities. CVE-2021-44228
    (Log4Shell) is a remote code execution flaw in Log4j2's JNDI
    lookup feature, added to KEV on 2021-12-10 (NVD CVSS 3.1 = 10.0
    CRITICAL). CVE-2021-45046 is an incomplete-fix follow-on to
    CVE-2021-44228, also in KEV (added 2023-05-01; NVD 9.0 CRITICAL).
    CVE-2021-45105 (NVD 5.9 MEDIUM) is an uncontrolled-recursion
    self-referential lookup issue in Log4j 2.0-alpha1 through 2.16.0.
    CVE-2017-5645 (NVD 9.8 CRITICAL) affects Apache Log4j 2.x before
    2.8.2 via a TCP/UDP socket server deserialization issue.
  expected_cve_ids:
    - CVE-2021-44228
    - CVE-2021-45046
    - CVE-2021-45105
    - CVE-2017-5645

# ─── PR 2 entries ────────────────────────────────────────────────────────
# Each maps 1:1 to a button in .env.example's ACTION_BUTTONS list.

- id: ransomware_linked_vulns
  query: "Ransomware-linked vulns"
  intent: analytics
  expected_tool: query
  ground_truth: |
    KEV entries with `known_ransomware_campaign_use = 'Known'` in the seed
    include Apache Log4j2 (CVE-2021-44228, CVE-2021-45046), Microsoft Office
    (CVE-2017-11882), Microsoft Exchange Server (CVE-2023-21529), Fortinet
    FortiOS SSL VPN (CVE-2018-13379), SonicWall SonicOS SSLVPN
    (CVE-2024-53704), Ivanti Connect Secure (CVE-2025-0282), JetBrains
    TeamCity (CVE-2024-27199), PaperCut NG/MF (CVE-2023-27351), and Cisco
    Secure Firewall Management Center / FMC (CVE-2026-20131). The agent
    should filter `kev_vulnerabilities` on `known_ransomware_campaign_use`.
  expected_cve_ids:
    - CVE-2021-44228
    - CVE-2021-45046
    - CVE-2017-11882
    - CVE-2018-13379
    - CVE-2024-53704
    - CVE-2025-0282
    - CVE-2023-27351
    - CVE-2024-27199
    - CVE-2023-21529
    - CVE-2026-20131
  notes: |
    Tests filter-on-flag analytics. Faithfulness will reflect whether
    the agent invents CVEs not actually in the seed.

- id: critical_vulns_active_exploits
  query: "Critical vulns with active exploits"
  intent: analytics
  expected_tool: query
  ground_truth: |
    "Active exploits" in this dataset means present in CISA KEV; "critical"
    means NVD `cvss_v31_severity = 'CRITICAL'`. Joining on cve_id, the
    seeded matches include Apache Log4j2 CVE-2021-44228 (10.0), SonicWall
    SonicOS CVE-2024-53704 (9.8), Fortinet FortiOS SSL VPN CVE-2018-13379
    (9.1), Apache Log4j2 CVE-2021-45046 (9.0), and Ivanti Connect Secure
    CVE-2025-0282 (9.0). All five also carry `known_ransomware_campaign_use
    = 'Known'`. The agent should JOIN kev_vulnerabilities and
    nvd_vulnerabilities on cve_id and filter by cvss_v31_severity.
  expected_cve_ids:
    - CVE-2021-44228
    - CVE-2024-53704
    - CVE-2018-13379
    - CVE-2021-45046
    - CVE-2025-0282
  notes: |
    JOIN test — the agent must cross-reference KEV (active-exploitation
    proxy) and NVD (severity).

- id: anthropic_claude
  query: "Anthropic Claude vulns"
  intent: lookup
  expected_tool: retrieve
  ground_truth: |
    Three Anthropic-related CVEs are seeded, all NVD-only (none in CISA KEV).
    CVE-2026-39861 (CVSS 10.0 CRITICAL) is a Claude Code sandbox escape via
    symlinks created by sandboxed processes — fixed in Claude Code 2.1.64.
    CVE-2026-25723 (6.5 MEDIUM) lets attackers bypass Claude Code's
    file-write restrictions through piped sed operations with echo — fixed
    in 2.0.55. CVE-2025-34072 is a data-exfiltration flaw in Anthropic's
    deprecated Slack MCP Server: an AI agent processing untrusted data
    could be manipulated into generating Slack messages whose automatic
    link unfurling leaked secrets.
  expected_cve_ids:
    - CVE-2026-39861
    - CVE-2026-25723
    - CVE-2025-34072
  notes: |
    Button text was renamed from "Anthropic Claude" to "Anthropic Claude
    vulns" in .env.example, app-service.bicep, and k8s/configmap.yaml so
    the bare entity name doesn't trigger the agent's intro response.
    Semantic-search question — `retrieve` should fire.

- id: openclaw
  query: "OpenClaw"
  intent: lookup
  expected_tool: retrieve
  ground_truth: |
    OpenClaw (also known as clawdbot or Moltbot) is the product affected
    by CVE-2026-25253 — the only OpenClaw entry in the seed. Versions
    before 2026.1.29 obtain a `gatewayUrl` from a query string and
    automatically open a WebSocket connection without prompting,
    transmitting a token value. NVD CVSS 3.1 = 8.8 (HIGH); not in CISA KEV
    (NVD-only, published 2026-02-01).
  expected_cve_ids:
    - CVE-2026-25253
  notes: |
    Bare-entity-name lookup. If the agent returns an intro message
    instead of vuln data (the failure mode that prompted the
    "Anthropic Claude" rename), this entry will surface it.

- id: cve_2017_11882_refs
  query: "Reference URLs for CVE-2017-11882"
  intent: lookup
  expected_tool: query
  ground_truth: |
    NVD lists 10 reference URLs for CVE-2017-11882 (Microsoft Office memory
    corruption / RCE): the official Microsoft MSRC advisory at
    portal.msrc.microsoft.com, two 0patch.blogspot.com posts on the patch
    history, four GitHub repositories with public PoCs (embedi, unamer,
    rxwx, 0x09AL/CVE-2017-11882-metasploit), securityfocus.com BID 101757,
    securitytracker.com 1039783, and a reversingminds-blog post titled
    "Fileless attack in Word without macros". The agent should select
    `reference_urls` from `nvd_vulnerabilities`.
  expected_cve_ids:
    - CVE-2017-11882
  notes: |
    Tests the agent's awareness of NVD-specific columns
    (`reference_urls`).

- id: top_ai_vulns_2026
  query: "Top AI vulns in 2026"
  intent: analytics
  expected_tool: either
  ground_truth: |
    The seeded AI/agentic-tooling CVEs published in 2026, ranked by
    CVSS, are: CVE-2026-39861 (Claude Code sandbox symlink escape, 10.0
    CRITICAL), CVE-2026-25592 (Microsoft Semantic Kernel arbitrary file
    write in the SessionsPython tool, 9.9 CRITICAL), CVE-2026-33873
    (Langflow Agentic Assistant RCE via LLM-generated Python during
    validation, 9.9 CRITICAL), and CVE-2026-34070 (LangChain
    `prompts.loading` directory-traversal file read, 7.5 HIGH).
    CVE-2026-25723 (Claude Code piped-sed file-write bypass, 6.5 MEDIUM)
    is also in scope. None are in CISA KEV.
  expected_cve_ids:
    - CVE-2026-39861
    - CVE-2026-25592
    - CVE-2026-33873
    - CVE-2026-34070
    - CVE-2026-25723
  notes: |
    Open-ended analytics — works via either retrieve (semantic) or
    query (filter NVD by description / published year).

- id: vpn_remote_access_vulns
  query: "VPN and remote access vulns"
  intent: listing
  expected_tool: retrieve
  ground_truth: |
    Three VPN / remote-access KEV entries are seeded. Fortinet FortiOS
    SSL VPN CVE-2018-13379 is a path-traversal flaw under SSL VPN web
    portal allowing unauthenticated attackers to download system files
    (NVD 9.1 CRITICAL, ransomware-linked). SonicWall SonicOS
    CVE-2024-53704 is an SSLVPN improper-authentication bypass (NVD 9.8
    CRITICAL, ransomware-linked). Ivanti Connect Secure / Policy Secure
    / Neurons-for-ZTA CVE-2025-0282 is an unauthenticated stack-based
    buffer overflow yielding RCE (NVD 9.0 CRITICAL, ransomware-linked).
  expected_cve_ids:
    - CVE-2018-13379
    - CVE-2024-53704
    - CVE-2025-0282
  notes: |
    Semantic-search question — agent should hit `retrieve` rather than
    SQL filter on a hard-coded "VPN" string.

- id: network_device_vulns
  query: "Network device vulns"
  intent: listing
  expected_tool: query
  ground_truth: |
    Network-device KEV entries in the seed surfaced by a vendor-name
    filter (Cisco, Fortinet, Ivanti) include Cisco Catalyst SD-WAN
    Manager (CVE-2026-20122, CVE-2026-20128, CVE-2026-20133), Cisco
    Secure Firewall Management Center / FMC (CVE-2026-20131), Fortinet
    FortiOS SSL VPN (CVE-2018-13379), Fortinet FortiClient EMS
    (CVE-2026-21643, CVE-2026-35616), and Ivanti Connect Secure / ZTA
    Gateways (CVE-2025-0282).
  expected_cve_ids:
    - CVE-2026-20122
    - CVE-2026-20128
    - CVE-2026-20131
    - CVE-2026-20133
    - CVE-2018-13379
    - CVE-2026-21643
    - CVE-2026-35616
    - CVE-2025-0282
  notes: |
    Agent reliably picks `query` with a vendor-name filter on the
    major network-device vendors. D-Link DIR-823X and SonicWall
    SSLVPN are also in the seed but consistently missed by this
    filter — tracked as a separate product follow-up, not in this
    entry's ground truth.

- id: microsoft_product_vulns
  query: "Microsoft product vulns"
  intent: listing
  expected_tool: retrieve
  ground_truth: |
    Nine Microsoft KEV entries are seeded across Office (CVE-2009-0238,
    CVE-2017-11882), Visual Basic for Applications / VBA (CVE-2012-1854),
    Exchange Server (CVE-2023-21529), Windows (CVE-2023-36424,
    CVE-2025-60710), SharePoint (CVE-2026-20963, CVE-2026-32201), and
    Defender (CVE-2026-33825). Vulnerabilities cover memory corruption,
    deserialization of untrusted data, insecure library loading,
    out-of-bounds reads, link following, improper input validation, and
    insufficient access-control granularity.
  expected_cve_ids:
    - CVE-2009-0238
    - CVE-2017-11882
    - CVE-2012-1854
    - CVE-2023-21529
    - CVE-2023-36424
    - CVE-2025-60710
    - CVE-2026-20963
    - CVE-2026-32201
    - CVE-2026-33825

- id: top_cwe_by_avg_cvss
  query: "Top CWE categories by avg CVSS score"
  intent: analytics
  expected_tool: query
  ground_truth: |
    Joining `nvd_vulnerabilities.cwes` against `cwe_definitions` and
    averaging `cvss_v31_score` per CWE, the seed's highest-scoring
    categories are CWE-61 (UNIX Symbolic Link Following, 10.0),
    CWE-400 (Uncontrolled Resource Consumption, 10.0), CWE-913 (Improper
    Control of Dynamically-Managed Code Resources, 9.9), CWE-862
    (Missing Authorization, 9.9), CWE-522 (Insufficiently Protected
    Credentials, 9.8), and CWE-502 (Deserialization of Untrusted Data,
    9.7). The agent's SQL should JOIN nvd_vulnerabilities (unnesting
    `cwes`) with cwe_definitions on cwe_id, GROUP BY cwe_id/name, and
    ORDER BY AVG(cvss_v31_score) DESC.
  notes: |
    Single-row weakness counts can pull averages to 10.0 in a small
    seed; that's expected behavior of the AVG() aggregate, not a bug.
