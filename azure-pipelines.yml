trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - docs/**
      - '*.md'
      # EKS-only artifacts — iterating on these should not fire the Azure pipeline
      - k8s/**
      - .github/**

pr: none

variables:
  acrName: acrvulncopilotdev
  acrLoginServer: acrvulncopilotdev.azurecr.io
  imageRepository: vulncopilot
  resourceGroup: rg-vulncopilot-dev
  appServiceName: app-vulncopilot-dev
  azureServiceConnection: azure-vulncopilot
  githubServiceConnection: github-vulncopilot
  # NOTE: personal/env-specific values (ETL_EMAIL_TO, ADMIN_USER_IDENTIFIERS) are
  # intentionally NOT declared here. A variable defined at the YAML root OVERRIDES a
  # Pipelines → Edit → Variables (UI) variable of the same name, so a default here
  # would permanently shadow the UI value (e.g. ETL_EMAIL_TO would always deploy
  # empty and the ETL email would never send). They are supplied only via the UI and
  # consumed below, where the inline script supplies the safe default for the unset
  # case (an undefined UI variable expands literally to "$(NAME)").

stages:
  # ─────────────────────────────────────────────────────────────
  # Stage 1: Build and push container image to ACR
  # ─────────────────────────────────────────────────────────────
  - stage: Build
    displayName: Build and push image
    jobs:
      - job: BuildAndPush
        displayName: Docker build and push
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            displayName: Checkout source

          - task: AzureCLI@2
            displayName: Build and push to ACR
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                IMAGE_TAG=$(Build.SourceVersion)
                SHORT_TAG=${IMAGE_TAG:0:7}

                echo "##vso[task.setvariable variable=imageTag;isOutput=true]$SHORT_TAG"

                az acr login --name $(acrName)

                docker build \
                  --platform linux/amd64 \
                  --tag $(acrLoginServer)/$(imageRepository):$SHORT_TAG \
                  --tag $(acrLoginServer)/$(imageRepository):latest \
                  .

                docker push $(acrLoginServer)/$(imageRepository):$SHORT_TAG
                docker push $(acrLoginServer)/$(imageRepository):latest

                echo "Pushed $(acrLoginServer)/$(imageRepository):$SHORT_TAG"
            name: buildOutput

  # ─────────────────────────────────────────────────────────────
  # Stage 2: Deploy infrastructure via Bicep
  # ─────────────────────────────────────────────────────────────
  - stage: DeployInfra
    displayName: Deploy infrastructure
    dependsOn: Build
    jobs:
      - deployment: DeployBicep
        displayName: Bicep what-if and deploy
        pool:
          vmImage: ubuntu-latest
        environment: vulncopilot-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  displayName: Checkout source

                - task: AzureCLI@2
                  displayName: Upgrade Bicep CLI
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: az bicep upgrade

                - task: AzureCLI@2
                  displayName: Register resource providers
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    # Namespaces used by the ETL job (Container Apps + Log Analytics)
                    # and the results email (ACS). Provider registration is a one-time,
                    # subscription-scoped action; we only attempt it when a namespace is
                    # not already Registered, so the pipeline SP (resource-group-scoped)
                    # doesn't need subscription-level register permission once they're set.
                    inlineScript: |
                      set -e
                      for ns in Microsoft.OperationalInsights Microsoft.App Microsoft.Communication; do
                        state=$(az provider show -n "$ns" --query registrationState -o tsv 2>/dev/null || echo "NotPresent")
                        if [ "$state" = "Registered" ]; then
                          echo "$ns: already Registered"
                        else
                          echo "$ns: $state — registering..."
                          az provider register --namespace "$ns" --wait
                          echo "$ns: $(az provider show -n "$ns" --query registrationState -o tsv)"
                        fi
                      done

                - task: AzureCLI@2
                  displayName: Bicep what-if (dry run)
                  # Map the UI (Pipelines → Edit → Variables) variables into the task env via
                  # $(...) macros. These vars are NOT declared in the YAML `variables:` block —
                  # a root-level YAML variable overrides the UI one, which would permanently
                  # shadow the UI value. The agent assigns these env values directly (no shell
                  # re-parsing), so a JSON array's double-quotes survive intact.
                  env:
                    ETL_EMAIL_TO: $(ETL_EMAIL_TO)
                    ADMIN_USER_IDENTIFIERS: $(ADMIN_USER_IDENTIFIERS)
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      # An unset UI variable reaches the agent as the literal macro text, not a
                      # value. Validate by shape and fall back to the safe default: a real
                      # recipient contains "@" (else no email); a real admin list is a JSON array
                      # "[...]" (else none). Note: do NOT compare against a "$(NAME)" literal here —
                      # the agent macro-expands $(...) in the script body before bash runs it, so a
                      # validly-set value would match its own sentinel and be wiped.
                      email_to="$ETL_EMAIL_TO"; case "$email_to" in *@*) ;; *) email_to='' ;; esac
                      admins="$ADMIN_USER_IDENTIFIERS"; case "$admins" in \[*\]) ;; *) admins='[]' ;; esac
                      az deployment group what-if \
                        --resource-group $(resourceGroup) \
                        --template-file infra/main.bicep \
                        --parameters infra/parameters.dev.bicepparam \
                        --parameters pipelineServicePrincipalObjectId=$(PIPELINE_SP_OBJECT_ID) \
                        --parameters etlEmailTo="$email_to" \
                        --parameters adminUserIdentifiers="$admins"

                - task: AzureCLI@2
                  displayName: Bicep deploy (incremental)
                  # See the what-if step above: the UI variables are mapped in via env: (they are
                  # deliberately not in the YAML `variables:` block, which would shadow them), and
                  # the script coerces an unset variable's literal "$(NAME)" to the safe default.
                  env:
                    ETL_EMAIL_TO: $(ETL_EMAIL_TO)
                    ADMIN_USER_IDENTIFIERS: $(ADMIN_USER_IDENTIFIERS)
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      # Same shape-based validation as the what-if step (see its comment): "@" for
                      # a recipient, "[...]" for the admin list, else the safe default. Avoid any
                      # "$(NAME)" literal — the agent would macro-expand it and wipe a set value.
                      email_to="$ETL_EMAIL_TO"; case "$email_to" in *@*) ;; *) email_to='' ;; esac
                      admins="$ADMIN_USER_IDENTIFIERS"; case "$admins" in \[*\]) ;; *) admins='[]' ;; esac
                      az deployment group create \
                        --resource-group $(resourceGroup) \
                        --template-file infra/main.bicep \
                        --parameters infra/parameters.dev.bicepparam \
                        --parameters pipelineServicePrincipalObjectId=$(PIPELINE_SP_OBJECT_ID) \
                        --parameters etlEmailTo="$email_to" \
                        --parameters adminUserIdentifiers="$admins" \
                        --mode Incremental

  # ─────────────────────────────────────────────────────────────
  # Stage 3: Deploy app (update container image + health check)
  # ─────────────────────────────────────────────────────────────
  - stage: DeployApp
    displayName: Deploy application
    dependsOn:
      - Build
      - DeployInfra
    variables:
      imageTag: $[ stageDependencies.Build.BuildAndPush.outputs['buildOutput.imageTag'] ]
    jobs:
      - deployment: DeployContainer
        displayName: Update container and verify
        pool:
          vmImage: ubuntu-latest
        environment: vulncopilot-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Update App Service container image
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      az webapp config container set \
                        --name $(appServiceName) \
                        --resource-group $(resourceGroup) \
                        --docker-custom-image-name $(acrLoginServer)/$(imageRepository):$(imageTag)

                      az webapp restart \
                        --name $(appServiceName) \
                        --resource-group $(resourceGroup)

                      echo "Deployed $(acrLoginServer)/$(imageRepository):$(imageTag)"

                - task: AzureCLI@2
                  displayName: Health check (poll /healthz for 240s)
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      HEALTH_URL="https://$(appServiceName).azurewebsites.net/healthz"
                      MAX_WAIT=240
                      INTERVAL=15
                      ELAPSED=0

                      echo "Polling $HEALTH_URL (max ${MAX_WAIT}s, every ${INTERVAL}s)"

                      while [ $ELAPSED -lt $MAX_WAIT ]; do
                        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")

                        if [ "$STATUS" = "200" ]; then
                          echo "Health check passed after ${ELAPSED}s (HTTP $STATUS)"
                          exit 0
                        fi

                        echo "  ${ELAPSED}s — HTTP $STATUS, retrying in ${INTERVAL}s..."
                        sleep $INTERVAL
                        ELAPSED=$((ELAPSED + INTERVAL))
                      done

                      echo "Health check timed out after ${MAX_WAIT}s"
                      exit 1
