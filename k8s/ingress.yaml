apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vulncopilot
  namespace: rag
  annotations:
    # Internet-facing ALB with IP target type (routes directly to pod IPs)
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # TLS: ACM cert (us-east-2) for rag.manheok.com; HTTPS required for
    # GitHub OAuth (CHAINLIT_URL is https). Redirect all HTTP to HTTPS.
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-2:958170895933:certificate/4d8e3a34-3ca5-4e13-b11f-98a4a07dd94a
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    # 600s idle timeout exceeds Chainlit's WebSocket keep-alive to prevent mid-chat disconnects
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=600
    # 24-hour sticky sessions ensure each browser always routes to the same pod (WebSocket state)
    alb.ingress.kubernetes.io/target-group-attributes: >-
      stickiness.enabled=true,stickiness.type=lb_cookie,stickiness.lb_cookie.duration_seconds=86400
spec:
  ingressClassName: alb
  rules:
    - host: rag.manheok.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vulncopilot
                port:
                  number: 80
