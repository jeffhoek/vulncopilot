apiVersion: apps/v1
kind: Deployment
metadata:
  name: chainlit-rag
  namespace: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chainlit-rag
  template:
    metadata:
      labels:
        app: chainlit-rag
    spec:
      serviceAccountName: chainlit-rag
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: chainlit-rag
          # Updated by CI/CD: kubectl set image deployment/chainlit-rag chainlit-rag=<ecr-image>:<sha>
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-2.amazonaws.com/chainlit-pydanticai-rag:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: rag-config
            - secretRef:
                name: rag-secrets
          # Chainlit writes upload spool files here at runtime (features.spontaneous_file_upload);
          # /tmp is a general safety net for libraries that assume a writable tmp dir.
          volumeMounts:
            - name: chainlit-files
              mountPath: /app/.files
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          # startupProbe gives the pod up to 30s to start (DB connection only, no data loading)
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 3
            periodSeconds: 10
          # readinessProbe runs after startupProbe succeeds
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          # livenessProbe restarts the pod if the app becomes unresponsive
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: chainlit-files
          emptyDir: {}
        - name: tmp
          emptyDir: {}
