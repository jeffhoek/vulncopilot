# external-secret.yaml — syncs rag-secrets from AWS SSM Parameter Store via ESO
#
# Prerequisites:
#   1. ESO is installed (helm_release.eso in myeks)
#   2. ClusterSecretStore "aws-ssm-parameter-store" has been applied (post-provision step)
#
# SSM parameters must exist at the paths below before ESO can sync.
# Create them with:
#
#   aws ssm put-parameter --name /rag/ANTHROPIC_API_KEY           --value <value> --type SecureString
#   aws ssm put-parameter --name /rag/OPENAI_API_KEY              --value <value> --type SecureString
#   aws ssm put-parameter --name /rag/CHAINLIT_AUTH_SECRET        --value <value> --type SecureString
#   aws ssm put-parameter --name /rag/ADMIN_SECRET               --value <value> --type SecureString
#   aws ssm put-parameter --name /rag/OAUTH_GITHUB_CLIENT_ID      --value <value> --type SecureString
#   aws ssm put-parameter --name /rag/OAUTH_GITHUB_CLIENT_SECRET  --value <value> --type SecureString
#   aws ssm put-parameter --name /rag/PG_DATABASE_URL            --value <read-only-supabase-dsn> --type SecureString
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rag-secrets
  namespace: rag
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm-parameter-store
    kind: ClusterSecretStore
  target:
    name: rag-secrets       # matches secretRef.name in deployment.yaml
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: /rag/ANTHROPIC_API_KEY
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: /rag/OPENAI_API_KEY
    - secretKey: CHAINLIT_AUTH_SECRET
      remoteRef:
        key: /rag/CHAINLIT_AUTH_SECRET
    - secretKey: ADMIN_SECRET
      remoteRef:
        key: /rag/ADMIN_SECRET
    - secretKey: OAUTH_GITHUB_CLIENT_ID
      remoteRef:
        key: /rag/OAUTH_GITHUB_CLIENT_ID
    - secretKey: OAUTH_GITHUB_CLIENT_SECRET
      remoteRef:
        key: /rag/OAUTH_GITHUB_CLIENT_SECRET
    - secretKey: PG_DATABASE_URL
      remoteRef:
        key: /rag/PG_DATABASE_URL
