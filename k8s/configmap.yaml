apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: rag
data:
  APP_USERNAME: "admin"
  LLM_MODEL: "anthropic:claude-haiku-4-5-20251001"
  TOP_K: "5"
  SYSTEM_PROMPT: >-
    You are a helpful assistant. Use the retrieve tool to find relevant context
    before answering questions. Answer the user's question helpfully and
    concisely based on the retrieved context. If the answer is not in the
    context, say you don't have that information.
  ACTION_BUTTONS: >-
    ["Latest KEV additions",
    "Critical vulns with active exploits",
    "Which vendors appear most in KEV?",
    "VPN and remote access vulnerabilities",
    "Ransomware-linked vulnerabilities",
    "Microsoft product vulnerabilities",
    "Network device vulnerabilities",
    "Show unpatched critical vulnerabilities",
    "AI and cloud tool vulnerabilities",
    "Which weakness types appear most in KEV?",
    "Top CWE categories by average CVSS score",
    "Show critical CVEs grouped by weakness type",
    "Anthropic Claude",
    "Top AI vulns in 2026",
    "CVE-2026-25253 include URLs",
    "OpenClaw include URLs"]
  PG_HOST: "your-tigerdata-endpoint.tsdb.cloud.timescale.com"
  PG_PORT: "5432"
  PG_DATABASE: "inventory"
