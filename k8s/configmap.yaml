apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: rag
data:
  # Auth is GitHub OAuth (app.py @cl.oauth_callback) — there is no password login.
  # CHAINLIT_URL must be the public HTTPS URL so Chainlit builds the OAuth
  # redirect_uri as https; behind the ALB it otherwise defaults to http and
  # GitHub rejects the mismatch. The GitHub OAuth App's callback must be
  # <CHAINLIT_URL>/auth/oauth/github/callback. See docs/public-access-setup.md.
  CHAINLIT_URL: "https://rag.jeffreyhoekman.com"
  # Authorization allow-list (JSON arrays). A user is admitted if any match.
  ALLOWED_LOGINS: '[]'        # GitHub usernames, e.g. ["jeffhoek"]
  # ALLOWED_EMAILS: '[]'      # explicit emails
  # ALLOWED_EMAIL_DOMAINS: '[]'
  # OPEN_REGISTRATION: "false" # "true" = any GitHub user allowed
  LLM_MODEL: "anthropic:claude-haiku-4-5-20251001"
  TOP_K: "5"
  SYSTEM_PROMPT: >-
    You are a helpful assistant. Use the retrieve tool to find relevant context
    before answering questions. Answer the user's question helpfully and
    concisely based on the retrieved context. If the answer is not in the
    context, say you don't have that information.
  ACTION_BUTTONS: >-
    ["Latest KEV additions",
    "Ransomware-linked vulns",
    "Critical vulns with active exploits",
    "Anthropic Claude",
    "CVE-2026-25253",
    "OpenClaw",
    "Get the reference URLs for that",
    "Top AI vulns in 2026",
    "VPN and remote access vulns",
    "Network device vulns",
    "Microsoft product vulns",
    "Top vendors in KEV",
    "Top CWE categories by avg CVSS score"]
  # The live app connects with a read-only Supabase role via PG_DATABASE_URL
  # (in the rag-secrets secret), so it must not run schema DDL — that's owned
  # by the admin/ETL connection. See docs/supabase-readonly-role.md.
  DB_INIT_SCHEMA: "false"
