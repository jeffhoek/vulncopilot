apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: rag
data:
  # Auth is GitHub OAuth (app.py @cl.oauth_callback) — there is no password login.
  # CHAINLIT_URL must be the public HTTPS URL so Chainlit builds the OAuth
  # redirect_uri as https; behind the ALB it otherwise defaults to http and
  # GitHub rejects the mismatch. The GitHub OAuth App's callback must be
  # <CHAINLIT_URL>/auth/oauth/github/callback. See docs/public-access-setup.md.
  CHAINLIT_URL: "https://rag.manheok.com"
  # FastMCP 3.x enables DNS-rebinding Host validation by default (localhost only),
  # so authenticated /mcp requests to the public host return 421 Misdirected
  # Request unless the ingress host is allow-listed here. See docs/mcp-server.md.
  FASTMCP_HTTP_ALLOWED_HOSTS: '["rag.manheok.com"]'
  # Authorization allow-list (JSON arrays). A user is admitted if any match.
  ALLOWED_LOGINS: '["jeffhoek"]'   # GitHub usernames admitted to the app
  # ALLOWED_EMAILS: '[]'      # explicit emails
  # ALLOWED_EMAIL_DOMAINS: '[]'
  # OPEN_REGISTRATION: "false" # "true" = any GitHub user allowed
  # Admin/trusted users get ADMIN_DAILY_QUERY_LIMIT instead of the default 20.
  # Keyed by the stable GitHub numeric ID (app.py builds identifiers as
  # "github:<id>"), NOT the username. github:1850699 = jeffhoek.
  ADMIN_USER_IDENTIFIERS: '["github:1850699"]'
  LLM_MODEL: "anthropic:claude-sonnet-5"
  TOP_K: "5"
  # SYSTEM_PROMPT intentionally unset — falls back to config.py's built-in
  # prompt, which has the schema and retrieve-vs-query tool routing guidance.
  # Do not override here without reproducing that full prompt (see how
  # infra/modules/app-service.bicep does it for the Azure deployment).
  ACTION_BUTTONS: >-
    ["List the 10 newest KEV entries by date_added",
    "List KEV entries with known ransomware use",
    "CVE-2021-44228 (Log4Shell)",
    "CVE-2017-0144 (EternalBlue)",
    "CVE-2023-34362 (MOVEit Transfer)",
    "Reference URLs for CVE-2025-53770 (SharePoint ToolShell)",
    "Top 10 AI-related CVEs in 2026 by CVSS score",
    "LLM prompt injection vulns",
    "Anthropic Claude vulns",
    "OpenClaw",
    "VPN and remote access vulns",
    "Top vendors in KEV",
    "Which weakness types appear most in KEV?"]
  # Logfire tracing (docs/observability.md). Requires LOGFIRE_TOKEN in the
  # rag-secrets secret (synced from SSM /rag/LOGFIRE_TOKEN via ESO).
  LOGFIRE_ENABLED: "true"
  # The live app connects with a read-only Supabase role via PG_DATABASE_URL
  # (in the rag-secrets secret), so it must not run schema DDL — that's owned
  # by the admin/ETL connection. See docs/supabase-readonly-role.md.
  DB_INIT_SCHEMA: "false"
