repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # Frozen Postgres snapshot with 1536-dim embeddings per row; ~4 MB.
        exclude: ^evals/fixtures/eval_db_seed\.jsonl$
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: pytest-unit-contract
        name: unit and contract tests
        entry: uv run pytest tests/unit tests/contract -q --no-header
        language: system
        pass_filenames: false
        always_run: true
